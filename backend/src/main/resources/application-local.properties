spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:wewatch}
spring.datasource.username=${DB_USER:wewatch}
spring.datasource.password=${DB_PASSWORD:wewatch}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=5000
