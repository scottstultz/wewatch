services:
  postgres:
    image: postgres:17
    container_name: wewatch-postgres
    environment:
      POSTGRES_DB: wewatch
      POSTGRES_USER: wewatch
      POSTGRES_PASSWORD: wewatch
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wewatch -d wewatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: wewatch-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: wewatch
      DB_USER: wewatch
      DB_PASSWORD: wewatch
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      TMDB_API_KEY: ${TMDB_API_KEY}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: wewatch-frontend
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "3000:80"

volumes:
  postgres-data:
