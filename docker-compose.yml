services:
  postgres:
    image: postgres:17
    container_name: wewatch-postgres
    environment:
      POSTGRES_DB: wewatch
      POSTGRES_USER: wewatch
      POSTGRES_PASSWORD: wewatch
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wewatch -d wewatch"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
